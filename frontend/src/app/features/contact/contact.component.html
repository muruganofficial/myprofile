<section id="contact" class="contact-section text-center">
    <div class="container reveal active">
        <p class="overline">What's Next?</p>
        <h2 class="title">Get In Touch</h2>
        <p class="description">
            Whether you have a question, an opportunity, or just want to say hi, my inbox is always open.
            You can reach me directly at <strong>murugan.itsofficial@gmail.com</strong> or call me at <strong>+91
                7871975184</strong>.
        </p>

        <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
            <div class="form-group">
                <input type="text" id="name" name="name" [(ngModel)]="model.name" required placeholder="Name">
            </div>
            <div class="form-group">
                <input type="email" id="email" name="email" [(ngModel)]="model.email" required placeholder="Email">
            </div>
            <div class="form-group">
                <input type="text" id="subject" name="subject" [(ngModel)]="model.subject" required
                    placeholder="Subject">
            </div>
            <div class="form-group">
                <textarea id="message" name="message" [(ngModel)]="model.message" required rows="5"
                    placeholder="Message"></textarea>
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="!contactForm.form.valid || isLoading">
                {{ isLoading ? 'Sending...' : 'Say Hello' }}
            </button>


        </form>
    </div>
</section>
